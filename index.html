<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮皮盃特戰英豪對抗賽</title>
    <link rel="icon" href="https://cdn.hsuddfps.com/LaopIcon_W.png" type="image/png">
    <style>
        /* 基礎樣式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 動態深色背景 - 保留流動感 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0f0f0f, #1a1a2e, #0f0f0f, #16213e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 內容容器 */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Logo 樣式 - 只做一次滑入並淡入，之後固定 */
        .logo {
            max-width: 300px; /* 這裡可以調整 Logo 的大小 */
            width: 80%;
            height: auto;
            opacity: 0; /* 初始狀態為透明 */
            transform: translateY(30px); /* 初始狀態向下偏移 */
            /* 動畫名稱: slideFadeIn
               持續時間: 1.5s
               計時函數: ease-out (由快變慢)
               填充模式: forwards (動畫結束後保留在最後一個狀態)
            */
            animation: slideFadeIn 1.5s ease-out forwards;
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.3)); /* 強化 Logo 光暈 */
        }

        @keyframes slideFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1; /* 最終狀態完全透明 */
                transform: translateY(0); /* 最終狀態回歸原位 */
            }
        }

        /* 電競質感微光掃描線 - 保留 */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 1;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.08;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="scanline"></div>

    <div class="container">
        <img src="https://cdn.hsuddfps.com/LaopIcon_W.png" alt="皮皮盃 Logo" class="logo">
    </div>

</body>
</html>
