<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Laop Cup《皮皮盃特戰英豪對抗賽》Season 3</title>
    <link rel="icon" href="https://cdn.hsuddfps.com/LaopIcon_W.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://cdn.hsuddfps.com/uploads/1495707807218012220_MainBackground.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 增加深度感 */
            z-index: -1;
        }

        /* 主容器 */
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        .logo {
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: block;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn span {
            display: block;
            font-size: 14px;
            font-weight: normal;
            opacity: 0.8;
            margin-top: 4px;
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }

        footer:hover {
            opacity: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .logo {
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdn.hsuddfps.com/LaopS3Logo_W.png" alt="Laop Season 3 Logo" class="logo">

        <div class="button-group">
            <a href="http://laop-season3.milotw.com/Competition_Rulebook.html" class="btn">
                賽事規章本
                <span>Competition Rulebook</span>
            </a>
            
            <a href="http://laop-season3.milotw.com/Schedule.html" class="btn">
                賽事時程表
                <span>Schedule</span>
            </a>
        </div>
    </div>

    <footer>
        © 2026 Pulse Studio. All Rights Reserved.
    </footer>

</body>
</html>
