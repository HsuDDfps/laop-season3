<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮皮盃特戰英豪對抗賽</title>
    <link rel="icon" href="https://cdn.hsuddfps.com/LaopIcon_W.png" type="image/png">
    <style>
        /* 基礎樣式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 動態深色背景 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0f0f0f, #1a1a2e, #0f0f0f, #16213e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 內容容器 */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 20px;
        }

        /* Logo 樣式 - 調小一點點 */
        .logo {
            max-width: 220px; 
            width: 60%;
            height: auto;
            opacity: 0;
            transform: translateY(20px);
            animation: slideFadeIn 1.2s ease-out forwards;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            margin-bottom: 40px; /* 與按鈕的間距 */
        }

        @keyframes slideFadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按鈕容器 */
        .button-group {
            display: flex;
            gap: 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.8s forwards; /* 延遲出現增加層次感 */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 電競風按鈕樣式 */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        /* 掃描線特效 */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 1;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.08;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }

        /* 手機版適應 */
        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
                gap: 15px;
            }
            .btn {
                text-align: center;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="scanline"></div>

    <div class="container">
        <img src="https://cdn.hsuddfps.com/LaopIcon_W.png" alt="皮皮盃 Logo" class="logo">

        <div class="button-group">
            <a href="http://laop-season3.milotw.com/Competition_Rulebook.html" class="btn">賽事規章本</a>
            <a href="http://laop-season3.milotw.com/Schedule.html" class="btn">賽事時程表</a>
        </div>
    </div>

</body>
</html>
